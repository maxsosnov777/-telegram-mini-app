<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genie Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .balance-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        
        .balance-card .amount {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .balance-card .label {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
        
        .balance-card .sub {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }
        
        .balance-card .sub span {
            color: #fff;
        }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 5px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .tab.active {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        
        .tab:hover {
            color: #fff;
        }
        
        .products {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .product-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .product-card .name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .product-card .price {
            color: #ffd700;
            font-size: 22px;
            font-weight: bold;
        }
        
        .product-card .desc {
            color: #aaa;
            font-size: 14px;
            margin: 10px 0;
            line-height: 1.4;
        }
        
        .product-card .buy-btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        
        .product-card .buy-btn:active {
            transform: scale(0.97);
        }
        
        .product-card .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .history {
            margin-top: 10px;
        }
        
        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #ffd700;
        }
        
        .history-item .info {
            flex: 1;
        }
        
        .history-item .info .product {
            font-size: 14px;
        }
        
        .history-item .info .date {
            color: #666;
            font-size: 11px;
            margin-top: 2px;
        }
        
        .history-item .price {
            color: #ffd700;
            font-weight: bold;
            font-size: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px 0;
            color: #888;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 0 auto 20px;
            border: 3px solid rgba(255,215,0,0.1);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty {
            text-align: center;
            color: #666;
            padding: 30px 0;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        
        .toast.success {
            background: rgba(46, 213, 115, 0.9);
            color: #fff;
        }
        
        .toast.error {
            background: rgba(255, 71, 87, 0.9);
            color: #fff;
        }
        
        .toast.info {
            background: rgba(54, 164, 235, 0.9);
            color: #fff;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .hidden {
            display: none !important;
        }
        
        .refresh-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .referral-section {
            background: rgba(255,215,0,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .referral-section .title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .referral-link {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .referral-link button {
            background: #ffd700;
            border: none;
            color: #1a1a2e;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        
        .referral-link button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>🛍 Genie Store</h1>
        </div>
        
        <!-- Баланс -->
        <div class="balance-card" id="balanceCard">
            <div class="amount" id="balanceAmount">0</div>
            <div class="label">🎰 Всего спинов</div>
            <div class="sub">
                <div>💎 Платные: <span id="paidSpins">0</span></div>
                <div>🎁 Бесплатные: <span id="freeSpins">0</span></div>
            </div>
        </div>
        
        <!-- Реферальная ссылка -->
        <div class="referral-section" id="referralSection" style="display:none;">
            <div class="title">🔗 Пригласи друга</div>
            <div class="referral-link">
                <span id="referralLink">Загрузка...</span>
                <button onclick="copyReferral()">📋</button>
            </div>
        </div>
        
        <!-- Вкладки -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('products')">📦 Товары</button>
            <button class="tab" onclick="switchTab('history')">📜 История</button>
        </div>
        
        <!-- Товары -->
        <div id="productsTab">
            <div class="products" id="productsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Загрузка товаров...
                </div>
            </div>
        </div>
        
        <!-- История -->
        <div id="historyTab" class="hidden">
            <div class="history" id="historyContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    Загрузка истории...
                </div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()" style="margin-top:20px;width:100%;">
            🔄 Обновить данные
        </button>
    </div>
    
    <script src="https://telegram-web-app.js.org/telegram-web-app.js"></script>
    <script>
        let userData = null;
        let tg = null;
        
        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            // Подключаемся к Telegram
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
            }
            
            // Загружаем данные
            loadData();
            
            // Автообновление каждые 30 секунд
            setInterval(loadData, 30000);
        });
        
        // Переключение вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'products' ? 0 : 1].classList.add('active');
            
            document.getElementById('productsTab').classList.toggle('hidden', tab !== 'products');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            
            if (tab === 'history') {
                loadHistory();
            }
        }
        
        // Загрузка данных
        function loadData() {
            // Показываем загрузку
            document.getElementById('productsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Загрузка...
                </div>
            `;
            
            // Запрашиваем данные через Telegram WebApp
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'get_data'
                }));
            } else {
                // Для тестирования в браузере
                loadMockData();
            }
        }
        
        // Загрузка истории
        function loadHistory() {
            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'get_history'
                }));
            }
        }
        
        // Обработка данных от бота
        window.handleWebAppData = function(data) {
            try {
                const parsed = typeof data === 'string' ? JSON.parse(data) : data;
                
                if (parsed.type === 'data') {
                    updateUI(parsed);
                } else if (parsed.type === 'history') {
                    renderHistory(parsed.history);
                } else if (parsed.type === 'order') {
                    showToast(parsed.message || '✅ Заказ оформлен!', 'success');
                    loadData();
                } else if (parsed.type === 'error') {
                    showToast(parsed.message || '❌ Ошибка!', 'error');
                }
            } catch (e) {
                console.error('Error handling data:', e);
            }
        };
        
        // Обновление UI
        function updateUI(data) {
            // Обновляем баланс
            if (data.spins) {
                document.getElementById('balanceAmount').textContent = data.spins.paid + data.spins.free;
                document.getElementById('paidSpins').textContent = data.spins.paid;
                document.getElementById('freeSpins').textContent = data.spins.free;
            }
            
            // Обновляем товары
            if (data.products) {
                renderProducts(data.products);
            }
            
            // Реферальная ссылка
            if (data.referral_link) {
                document.getElementById('referralSection').style.display = 'block';
                document.getElementById('referralLink').textContent = data.referral_link;
            }
        }
        
        // Рендер товаров
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        📦 Товаров пока нет
                    </div>
                `;
                return;
            }
            
            let html = '';
            products.forEach(product => {
                html += `
                    <div class="product-card">
                        <div class="name">${product.name}</div>
                        <div class="price">💰 ${product.price} руб.</div>
                        <div class="desc">${product.desc || ''}</div>
                        <button class="buy-btn" onclick="buyProduct(${product.id}, '${product.name}', ${product.price})">
                            🛒 Купить
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Рендер истории
        function renderHistory(history) {
            const container = document.getElementById('historyContainer');
            
            if (!history || history.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        📜 История пуста
                    </div>
                `;
                return;
            }
            
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="history-item">
                        <div class="info">
                            <div class="product">${item.product || 'Товар'}</div>
                            <div class="date">${item.date || ''}</div>
                        </div>
                        <div class="price">${item.price} ₽</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Покупка товара
        function buyProduct(id, name, price) {
            const balance = parseInt(document.getElementById('balanceAmount').textContent);
            const minSpins = 10;
            
            if (balance < minSpins) {
                showToast(`❌ Недостаточно спинов! Нужно: ${minSpins}, у вас: ${balance}`, 'error');
                return;
            }
            
            if (confirm(`Подтвердите покупку:\n\n📦 ${name}\n💰 ${price} руб.\n🎰 Спинов: ${balance}`)) {
                // Отправляем запрос в бот
                if (tg) {
                    tg.sendData(JSON.stringify({
                        action: 'buy',
                        product_id: id,
                        product_name: name,
                        price: price
                    }));
                } else {
                    // Для тестирования
                    showToast('✅ Заказ оформлен! (тест)', 'success');
                    loadMockData();
                }
            }
        }
        
        // Копирование реферальной ссылки
        function copyReferral() {
            const link = document.getElementById('referralLink').textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    showToast('✅ Ссылка скопирована!', 'success');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = link;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✅ Ссылка скопирована!', 'success');
            }
        }
        
        // Toast уведомления
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // Мок данные для тестирования в браузере
        function loadMockData() {
            const mockData = {
                type: 'data',
                products: [
                    { id: 1, name: '🍼 Пробник', price: 250, desc: '13 ГБ детского питания. Отличный вариант для знакомства.' },
                    { id: 2, name: '🍱 4 ТБ детского', price: 499, desc: 'Большой набор детского питания высокого качества. 4 ТБ контента.' }
                ],
                spins: { paid: 5, free: 10 },
                referral_link: 'https://t.me/genrimagaz_bot?start=ref_123456'
            };
            updateUI(mockData);
            
            // Мок история
            setTimeout(() => {
                renderHistory([
                    { product: '🍼 Пробник', price: 250, date: '2024-01-15 14:30' },
                    { product: '🎰 Спины (10 шт.)', price: 50, date: '2024-01-14 12:00' }
                ]);
            }, 500);
        }
        
        // Обработка ответа от бота через Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.onEvent('message', function(event) {
                try {
                    const data = JSON.parse(event.data);
                    window.handleWebAppData(data);
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            });
        }
        
        console.log('✅ Genie Store WebApp загружен!');
    </script>
</body>
</html>
