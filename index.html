<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин @genrimagaz_bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 420px;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        .user-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-weight: 600;
            font-size: 16px;
        }
        .user-id {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .spins-info {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .spin-item {
            text-align: center;
        }
        .spin-count {
            font-size: 24px;
            font-weight: 700;
            color: #00d4ff;
        }
        .spin-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .spin-total {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .products {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .product {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0, 212, 255, 0.3);
        }
        .product.selected {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }
        .product-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .product-name {
            font-size: 16px;
            font-weight: 500;
        }
        .product-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: #00d4ff;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2ffc);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6);
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.12);
        }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(0, 255, 100, 0.1);
            border: 1px solid rgba(0, 255, 100, 0.2);
            color: #00ff64;
        }
        .status.error {
            display: block;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: #ff4444;
        }
        .status.info {
            display: block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }
        .footer {
            text-align: center;
            padding: 20px 0;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Магазин</h1>
            <p>Выберите товар и оплатите</p>
        </div>

        <div class="user-card" id="userCard">
            <div class="user-avatar" id="userAvatar">👤</div>
            <div class="user-info">
                <div class="user-name" id="userName">Гость</div>
                <div class="user-id" id="userId">ID: не авторизован</div>
            </div>
        </div>

        <div class="spins-info">
            <div class="spin-item">
                <div class="spin-count" id="freeSpins">10</div>
                <div class="spin-label">Бесплатные</div>
            </div>
            <div class="spin-item">
                <div class="spin-count" id="paidSpins">0</div>
                <div class="spin-label">Платные</div>
            </div>
            <div class="spin-item">
                <div class="spin-total" id="totalSpins">10</div>
                <div class="spin-label">Всего</div>
            </div>
        </div>

        <div class="products">
            <div class="product" data-id="1" data-name="Премиум доступ" data-price="499">
                <div class="product-left">
                    <div class="product-name">🎮 Премиум доступ</div>
                    <div class="product-desc">Полный доступ ко всем функциям</div>
                </div>
                <div class="product-price">499 ₽</div>
            </div>
            <div class="product" data-id="2" data-name="Видео-курс" data-price="299">
                <div class="product-left">
                    <div class="product-name">📚 Видео-курс</div>
                    <div class="product-desc">10 обучающих видео</div>
                </div>
                <div class="product-price">299 ₽</div>
            </div>
            <div class="product" data-id="3" data-name="10 спинов" data-price="50">
                <div class="product-left">
                    <div class="product-name">🎰 10 спинов</div>
                    <div class="product-desc">Для просмотра галереи</div>
                </div>
                <div class="product-price">50 ₽</div>
            </div>
        </div>

        <button class="btn btn-primary" id="buyBtn" disabled>🛒 Выберите товар</button>
        <button class="btn btn-secondary" id="closeBtn">❌ Закрыть</button>

        <div class="status" id="status"></div>

        <div class="footer">© 2026 Genie магазин</div>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Данные пользователя
        const user = tg.initDataUnsafe?.user;
        let userId = 'Неизвестно';
        let userName = 'Гость';

        if (user) {
            userId = user.id || 'Неизвестно';
            userName = user.first_name || user.username || 'Гость';
            document.getElementById('userName').textContent = userName;
            document.getElementById('userId').textContent = `ID: ${userId}`;
            document.getElementById('userAvatar').textContent = userName.charAt(0).toUpperCase();
        }

        // Состояние
        let selectedProduct = null;

        // Выбор товара
        document.querySelectorAll('.product').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('.product').forEach(p => p.classList.remove('selected'));
                this.classList.add('selected');
                
                const name = this.dataset.name;
                const price = this.dataset.price;
                const id = this.dataset.id;
                
                selectedProduct = { id, name, price };
                
                document.getElementById('buyBtn').textContent = `🛒 Купить ${name} за ${price} ₽`;
                document.getElementById('buyBtn').disabled = false;
                
                showStatus(`Выбран: ${name} (${price} ₽)`, 'info');
            });
        });

        // Кнопка купить
        document.getElementById('buyBtn').addEventListener('click', function() {
            if (!selectedProduct) {
                showStatus('❌ Сначала выберите товар', 'error');
                return;
            }

            const data = {
                action: 'buy',
                product_id: selectedProduct.id,
                product_name: selectedProduct.name,
                price: parseInt(selectedProduct.price),
                user_id: userId,
                username: userName
            };

            tg.sendData(JSON.stringify(data));
            
            showStatus(`✅ Заказ на "${selectedProduct.name}" отправлен!`, 'success');
            
            this.disabled = true;
            this.textContent = '✅ Отправлено';
            
            setTimeout(() => {
                this.textContent = '🛒 Купить';
                this.disabled = false;
                document.querySelectorAll('.product').forEach(p => p.classList.remove('selected'));
                selectedProduct = null;
            }, 3000);
        });

        // Закрыть
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });

        // Главная кнопка
        tg.MainButton.setText('🛒 Купить');
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            document.getElementById('buyBtn').click();
        });

        // Статус
        function showStatus(msg, type = 'info') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        // Обновление спинов
        function updateSpins(free, paid) {
            document.getElementById('freeSpins').textContent = free || 10;
            document.getElementById('paidSpins').textContent = paid || 0;
            document.getElementById('totalSpins').textContent = (free || 10) + (paid || 0);
        }

        console.log('✅ Мини-приложение загружено');
        console.log('👤 Пользователь:', user);
    </script>
</body>
</html>
