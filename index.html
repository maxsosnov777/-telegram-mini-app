<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genie Store</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* ===== ФОН С МЕЛКИМИ УЗОРАМИ ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.03) 1px, transparent 1px),
                radial-gradient(circle at 30% 60%, rgba(255,255,255,0.02) 1px, transparent 1px),
                radial-gradient(circle at 50% 80%, rgba(255,255,255,0.03) 1px, transparent 1px),
                radial-gradient(circle at 70% 30%, rgba(255,255,255,0.02) 1px, transparent 1px),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.03) 1px, transparent 1px),
                radial-gradient(circle at 15% 90%, rgba(255,255,255,0.02) 1px, transparent 1px),
                radial-gradient(circle at 85% 10%, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px, 80px 80px, 100px 100px, 70px 70px, 90px 90px, 50px 50px, 120px 120px;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Дополнительный слой узоров */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 16px 16px 80px;
            position: relative;
            z-index: 1;
        }
        
        /* ===== ШАПКА ===== */
        .header {
            text-align: center;
            padding: 24px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 20px;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }
        
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffffff 0%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        
        .header .subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        
        /* ===== КАРТОЧКА БАЛАНСА ===== */
        .balance-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .balance-card .amount {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
        }
        
        .balance-card .label {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            margin-top: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .balance-card .sub {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .balance-card .sub .item {
            text-align: center;
        }
        
        .balance-card .sub .item .value {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .balance-card .sub .item .label {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        
        .balance-card .sub .item .value.paid { color: #ffffff; }
        .balance-card .sub .item .value.free { color: rgba(255,255,255,0.6); }
        
        /* ===== КНОПКИ-ТАБЫ ===== */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.3);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab.active {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .tab:hover {
            color: rgba(255,255,255,0.7);
        }
        
        .tab .icon {
            margin-right: 6px;
        }
        
        /* ===== КАРТОЧКИ ТОВАРОВ ===== */
        .products {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .product-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            pointer-events: none;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }
        
        .product-card .top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        
        .product-card .name {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .product-card .price {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
        }
        
        .product-card .price .currency {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
        }
        
        .product-card .desc {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            line-height: 1.5;
            margin-bottom: 14px;
        }
        
        .product-card .buy-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.06);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        
        .product-card .buy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }
        
        .product-card .buy-btn:hover::before {
            left: 100%;
        }
        
        .product-card .buy-btn:active {
            transform: scale(0.97);
            background: rgba(255,255,255,0.1);
        }
        
        .product-card .buy-btn .emoji {
            margin-right: 8px;
        }
        
        /* ===== ИСТОРИЯ ===== */
        .history {
            margin-top: 4px;
        }
        
        .history-item {
            background: rgba(255,255,255,0.02);
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .history-item .info {
            flex: 1;
        }
        
        .history-item .info .product {
            font-size: 14px;
            color: #ffffff;
        }
        
        .history-item .info .date {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            margin-top: 2px;
        }
        
        .history-item .price {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }
        
        /* ===== ЗАГРУЗКА ===== */
        .loading {
            text-align: center;
            padding: 50px 0;
        }
        
        .spinner {
            width: 36px;
            height: 36px;
            margin: 0 auto 16px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        .empty {
            text-align: center;
            color: rgba(255,255,255,0.2);
            padding: 40px 0;
            font-size: 15px;
        }
        
        /* ===== TOAST УВЕДОМЛЕНИЯ ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 14px;
            z-index: 1000;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .toast.success {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
        }
        
        .toast.error {
            background: rgba(255,70,70,0.15);
            color: #ff6b6b;
            border-color: rgba(255,70,70,0.1);
        }
        
        .toast.info {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        
        /* ===== КНОПКА ОБНОВЛЕНИЯ ===== */
        .refresh-btn {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 16px;
            letter-spacing: 1px;
        }
        
        .refresh-btn:hover {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
        }
        
        /* ===== РЕФЕРАЛЬНАЯ ССЫЛКА ===== */
        .referral-section {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .referral-section .title {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .referral-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        
        .referral-link .link {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            word-break: break-all;
            flex: 1;
            font-family: monospace;
        }
        
        .referral-link .copy-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .referral-link .copy-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.06);
        }
        
        /* ===== СКРЫТЫЕ ЭЛЕМЕНТЫ ===== */
        .hidden {
            display: none !important;
        }
        
        /* ===== АДАПТИВ ===== */
        @media (max-width: 400px) {
            .container { padding: 12px 12px 70px; }
            .header h1 { font-size: 22px; }
            .balance-card .amount { font-size: 34px; }
            .product-card { padding: 14px 16px; }
            .product-card .name { font-size: 15px; }
            .product-card .price { font-size: 17px; }
        }
        
        /* ===== СКРОЛЛ ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- ШАПКА -->
        <div class="header">
            <h1>✦ GENIE STORE</h1>
            <div class="subtitle">Premium Collection</div>
        </div>
        
        <!-- БАЛАНС -->
        <div class="balance-card">
            <div class="amount" id="balanceAmount">0</div>
            <div class="label">Available Spins</div>
            <div class="sub">
                <div class="item">
                    <div class="value paid" id="paidSpins">0</div>
                    <div class="label">Paid</div>
                </div>
                <div class="item">
                    <div class="value free" id="freeSpins">0</div>
                    <div class="label">Free</div>
                </div>
            </div>
        </div>
        
        <!-- РЕФЕРАЛЬНАЯ ССЫЛКА -->
        <div class="referral-section" id="referralSection" style="display:none;">
            <div class="title">✦ Invite Friend</div>
            <div class="referral-link">
                <span class="link" id="referralLink">Loading...</span>
                <button class="copy-btn" onclick="copyReferral()">Copy</button>
            </div>
        </div>
        
        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('products')">
                <span class="icon">✦</span> Products
            </button>
            <button class="tab" onclick="switchTab('history')">
                <span class="icon">◈</span> History
            </button>
        </div>
        
        <!-- ТОВАРЫ -->
        <div id="productsTab">
            <div class="products" id="productsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- ИСТОРИЯ -->
        <div id="historyTab" class="hidden">
            <div class="history" id="historyContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">Loading...</div>
                </div>
            </div>
        </div>
        
        <!-- КНОПКА ОБНОВЛЕНИЯ -->
        <button class="refresh-btn" onclick="loadData()">⟳ Refresh</button>
    </div>
    
    <script src="https://telegram-web-app.js.org/telegram-web-app.js"></script>
    <script>
        let tg = null;
        let currentTab = 'products';
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✦ Genie Store loaded');
            
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                console.log('✓ Telegram WebApp connected');
                
                tg.onEvent('message', function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleData(data);
                    } catch (e) {
                        console.error('Parse error:', e);
                    }
                });
            } else {
                console.log('⚠ Telegram WebApp not found, using mock mode');
            }
            
            setTimeout(loadData, 300);
        });
        
        // ============================================
        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // ============================================
        
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'products' ? 0 : 1].classList.add('active');
            
            document.getElementById('productsTab').classList.toggle('hidden', tab !== 'products');
            document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
            
            if (tab === 'history') {
                loadHistory();
            }
        }
        
        // ============================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================
        
        function loadData() {
            console.log('⟳ Loading data...');
            
            document.getElementById('productsContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">Loading...</div>
                </div>
            `;
            
            if (tg) {
                tg.sendData(JSON.stringify({ action: 'get_data' }));
            } else {
                loadMockData();
            }
        }
        
        function loadHistory() {
            if (tg) {
                tg.sendData(JSON.stringify({ action: 'get_history' }));
            } else {
                loadMockHistory();
            }
        }
        
        // ============================================
        // ОБРАБОТКА ДАННЫХ
        // ============================================
        
        function handleData(data) {
            console.log('📦 Data received:', data);
            
            if (data.type === 'data') {
                updateUI(data);
            } else if (data.type === 'history') {
                renderHistory(data.history);
            } else if (data.type === 'order') {
                showToast(data.message, 'success');
                loadData();
            } else if (data.type === 'error') {
                showToast(data.message, 'error');
            }
        }
        
        // ============================================
        // ОБНОВЛЕНИЕ UI
        // ============================================
        
        function updateUI(data) {
            // Баланс
            if (data.spins) {
                const total = (data.spins.paid || 0) + (data.spins.free || 0);
                document.getElementById('balanceAmount').textContent = total;
                document.getElementById('paidSpins').textContent = data.spins.paid || 0;
                document.getElementById('freeSpins').textContent = data.spins.free || 0;
            }
            
            // Товары
            if (data.products) {
                renderProducts(data.products);
            }
            
            // Реферальная ссылка
            if (data.referral_link) {
                document.getElementById('referralSection').style.display = 'block';
                document.getElementById('referralLink').textContent = data.referral_link;
            }
        }
        
        // ============================================
        // РЕНДЕР ТОВАРОВ
        // ============================================
        
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="empty">✦ No products available</div>`;
                return;
            }
            
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <div class="top">
                            <div class="name">${p.name}</div>
                            <div class="price">${p.price}<span class="currency"> ₽</span></div>
                        </div>
                        <div class="desc">${p.desc || ''}</div>
                        <button class="buy-btn" onclick="buyProduct(${p.id}, '${p.name}', ${p.price})">
                            <span class="emoji">◈</span> Purchase
                        </button>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // ============================================
        // РЕНДЕР ИСТОРИИ
        // ============================================
        
        function renderHistory(history) {
            const container = document.getElementById('historyContainer');
            
            if (!history || history.length === 0) {
                container.innerHTML = `<div class="empty">◈ History is empty</div>`;
                return;
            }
            
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="history-item">
                        <div class="info">
                            <div class="product">${item.product || 'Product'}</div>
                            <div class="date">${item.date || ''}</div>
                        </div>
                        <div class="price">${item.price} ₽</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // ============================================
        // ПОКУПКА
        // ============================================
        
        function buyProduct(id, name, price) {
            const balance = parseInt(document.getElementById('balanceAmount').textContent);
            const minSpins = 10;
            
            if (balance < minSpins) {
                showToast(`Not enough spins! Need: ${minSpins}, you have: ${balance}`, 'error');
                return;
            }
            
            if (confirm(`Confirm purchase:\n\n${name}\n💰 ${price} ₽`)) {
                console.log(`🛒 Buying: ${name} (ID: ${id})`);
                
                if (tg) {
                    tg.sendData(JSON.stringify({
                        action: 'buy',
                        product_id: id,
                        product_name: name,
                        price: price
                    }));
                } else {
                    showToast('✓ Order placed! (mock)', 'success');
                    loadMockData();
                }
            }
        }
        
        // ============================================
        // КОПИРОВАНИЕ РЕФЕРАЛЬНОЙ ССЫЛКИ
        // ============================================
        
        function copyReferral() {
            const link = document.getElementById('referralLink').textContent;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(link).then(() => {
                    showToast('✓ Link copied!', 'success');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = link;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✓ Link copied!', 'success');
            }
        }
        
        // ============================================
        // TOAST УВЕДОМЛЕНИЯ
        // ============================================
        
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px) scale(0.95)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ============================================
        // МОК ДАННЫЕ ДЛЯ ТЕСТИРОВАНИЯ
        // ============================================

        console.log('✦ Genie Store ready');
    </script>
